<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Active Solution</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 24px;

      margin-top: 24px;
      padding: 10px 18px;
      background: rgba(108,142,191,0.12);
      border: 1px solid rgba(108,142,191,0.3);
      border-radius: 6px;
      font-size: 0.85rem;
      color: #6c8ebf;
    }
  </style>
</head>
<body>
  <div class="icon">&#128193;</div>
  <h1>No Active Solution</h1>
  <p>Servoy AI needs an active solution to know which project to open.</p>
